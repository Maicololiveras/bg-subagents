name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + Trusted Publishing OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # releases must never cancel each other

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (gate on 432 green)
        run: pnpm test

      - name: Generate JSON Schema
        run: node scripts/schema-publish.mjs

      # Upgrade npm so `changeset publish` can use OIDC Trusted Publishing (requires npm >= 11.5.1).
      # --force + --ignore-scripts works around npm self-upgrade MODULE_NOT_FOUND bug
      # (npm rewrites its own node_modules mid-install and loses dep references).
      - name: Upgrade npm CLI for Trusted Publishing
        run: npm install -g npm@11.5.2 --force --ignore-scripts

      - uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
