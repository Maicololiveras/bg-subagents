name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Lint + Typecheck + Test (${{ matrix.runtime }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: node
            label: "Node 22 / Ubuntu"
          - os: windows-latest
            runtime: node
            label: "Node 22 / Windows"
          - os: ubuntu-latest
            runtime: bun
            label: "Bun 1.3.x / Ubuntu"
          - os: windows-latest
            runtime: bun
            label: "Bun 1.3.x / Windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
