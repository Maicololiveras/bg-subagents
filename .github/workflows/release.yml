name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + Trusted Publishing OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # releases must never cancel each other

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (gate on 432 green)
        run: pnpm test

      - name: Generate JSON Schema
        run: node scripts/schema-publish.mjs

      # Upgrade pnpm to 10.x for the publish step only. pnpm 10.8+ is required to:
      # (a) transform `workspace:*` deps to concrete versions before uploading the
      #     tarball (npm publish does NOT do this, causing EUNSUPPORTEDPROTOCOL on install);
      # (b) use OIDC Trusted Publishing (added in 10.8).
      # Install/build/test steps above already ran with pnpm 9.x (from packageManager),
      # so the lockfile stays consistent.
      - name: Install pnpm 10 for OIDC-capable publish with workspace transform
        run: npm install -g pnpm@latest

      - uses: changesets/action@v1
        with:
          publish: pnpm -r publish --access public --provenance --no-git-checks
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
